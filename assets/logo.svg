<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 244 244" width="244" height="244">
  <!--
    寶璣建設有限公司 LOGO
    極簡浮雕金幣 — 大樓置中版
    Transparent background, scalable vector
  -->

  <!-- ── RIM LAYERS ── -->
  <circle cx="122" cy="122" r="122" fill="#8a6e24"/>
  <circle cx="122" cy="122" r="118" fill="#b8923a"/>
  <circle cx="122" cy="122" r="114" fill="#c9a040"/>
  <circle cx="122" cy="122" r="110" fill="#d4aa52"/>

  <!-- ── COIN FACE ── -->
  <circle cx="122" cy="122" r="104" fill="#1a1410"/>

  <!-- Subtle lathe lines -->
  <circle cx="122" cy="122" r="104" fill="none" stroke="#b8923a"
    stroke-width="0.3" stroke-dasharray="1 3.8" opacity="0.18"/>
  <circle cx="122" cy="122" r="94" fill="none" stroke="#b8923a"
    stroke-width="0.3" opacity="0.12"/>

  <!-- ── BUILDING — centered, lower position ── -->

  <!-- Depth shadow -->
  <rect x="99" y="89" width="52" height="82"
    fill="#b8923a" opacity="0.1" transform="translate(3,3)"/>

  <!-- Tower body -->
  <rect x="96" y="86" width="52" height="82" fill="#b8923a"/>

  <!-- Stepped crown -->
  <rect x="104" y="74" width="36" height="14" fill="#b8923a"/>
  <rect x="112" y="62" width="20" height="14" fill="#b8923a"/>

  <!-- Spire -->
  <polygon points="122,46 118,62 126,62" fill="#d4aa52"/>
  <circle cx="122" cy="46" r="3.5" fill="#d4aa52"/>

  <!-- Windows — negative space (punched black) -->
  <rect x="102" y="94"  width="9" height="8" fill="#1a1410"/>
  <rect x="116" y="94"  width="9" height="8" fill="#1a1410"/>
  <rect x="130" y="94"  width="9" height="8" fill="#1a1410"/>
  <rect x="102" y="107" width="9" height="8" fill="#1a1410"/>
  <rect x="116" y="107" width="9" height="8" fill="#1a1410"/>
  <rect x="130" y="107" width="9" height="8" fill="#1a1410"/>
  <rect x="102" y="120" width="9" height="8" fill="#1a1410"/>
  <rect x="116" y="120" width="9" height="8" fill="#1a1410"/>
  <rect x="130" y="120" width="9" height="8" fill="#1a1410"/>
  <rect x="116" y="133" width="9" height="8" fill="#1a1410"/>

  <!-- Door -->
  <rect x="115" y="156" width="14" height="12" rx="1"
    fill="#1a1410" opacity="0.8"/>

  <!-- Base platform -->
  <rect x="82" y="168" width="80" height="6"  fill="#b8923a"/>
  <rect x="72" y="174" width="100" height="4" fill="#b8923a" opacity="0.55"/>

</svg>
