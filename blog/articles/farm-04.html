<script id="bq-ultimate-hamburger-js">
/* ════════════════════════════════════════════════════════════
   🛡 終極 hamburger JS(備援)
   保證所有可能的 hamburger 按鈕都能開關
   ════════════════════════════════════════════════════════════ */
(function(){
  function setup(){
    // 找所有可能的 hamburger 按鈕
    var btns = document.querySelectorAll('.hamburger, .nav-hamburger, #hamBtn, [aria-label="選單"], button[aria-label*="menu" i]');
    // 找所有可能的 menu
    var menu = document.querySelector('.nav-menu') || document.querySelector('#navMenu') || document.querySelector('.nav ul');
    if (!menu) return;
    
    btns.forEach(function(btn){
      if (btn.__bqBound) return;  // 避免重複綁定
      btn.__bqBound = true;
      btn.addEventListener('click', function(e){
        e.preventDefault();
        e.stopPropagation();
        menu.classList.toggle('open');
        menu.classList.toggle('is-open');
        btn.classList.toggle('open');
        btn.classList.toggle('is-active');
      });
    });
    
    // 點 menu 外關閉
    document.addEventListener('click', function(e){
      if (menu.classList.contains('open') || menu.classList.contains('is-open')) {
        var insideMenu = menu.contains(e.target);
        var onBtn = Array.from(btns).some(function(b){ return b.contains(e.target); });
        if (!insideMenu && !onBtn) {
          menu.classList.remove('open');
          menu.classList.remove('is-open');
          btns.forEach(function(b){
            b.classList.remove('open');
            b.classList.remove('is-active');
          });
        }
      }
    });
  }
  
  if (document.readyState === 'loading') {
    document.addEventListener('DOMContentLoaded', setup);
  } else {
    setup();
  }
})();
</script>
