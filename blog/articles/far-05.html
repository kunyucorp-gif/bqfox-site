<script id="bq-ultimate-hamburger-js">
/* ════════════════════════════════════════════════════════════
   🛡 終極 hamburger JS(備援)
   保證所有可能的 hamburger 按鈕都能開關
   ════════════════════════════════════════════════════════════ */
(function(){
  function setup(){
    // 找所有可能的 hamburger 按鈕
    var btns = document.querySelectorAll('.hamburger, .nav-hamburger, #hamBtn, [aria-label="選單"], button[aria-label*="menu" i]');
    // 找所有可能的 menu
    var menu = document.querySelector('.nav-menu') || document.querySelector('#navMenu') || document.querySelector('.nav ul');
    if (!menu) return;
    
    btns.forEach(function(btn){
      if (btn.__bqBound) return;  // 避免重複綁定
      btn.__bqBound = true;
      btn.addEventListener('click', function(e){
        e.preventDefault();
        e.stopPropagation();
        menu.classList.toggle('open');
        menu.classList.toggle('is-open');
        btn.classList.toggle('open');
        btn.classList.toggle('is-active');
      });
    });
    
    // 點 menu 外關閉
    document.addEventListener('click', function(e){
      if (menu.classList.contains('open') || menu.classList.contains('is-open')) {
        var insideMenu = menu.contains(e.target);
        var onBtn = Array.from(btns).some(function(b){ return b.contains(e.target); });
        if (!insideMenu && !onBtn) {
          menu.classList.remove('open');
          menu.classList.remove('is-open');
          btns.forEach(function(b){
            b.classList.remove('open');
            b.classList.remove('is-active');
          });
        }
      }
    });
  }
  
  if (document.readyState === 'loading') {
    document.addEventListener('DOMContentLoaded', setup);
  } else {
    setup();
  }
})();
</script>

<script id="bq-real-fix-round4-js">
/* ════════════════════════════════════════════════════════════
   🛡 真終極 Hamburger JS Round 4
   綁 #hbtn(實際 id)+ 所有變體
   ════════════════════════════════════════════════════════════ */
(function(){
  function initRealFix(){
    // 1. 找所有 hamburger(包含實際用的 #hbtn)
    var btns = [];
    var hbtn = document.getElementById('hbtn');
    var hamBtn = document.getElementById('hamBtn');
    if (hbtn) btns.push(hbtn);
    if (hamBtn) btns.push(hamBtn);
    
    // 再找所有 .hamburger class
    document.querySelectorAll('.hamburger, .nav-hamburger').forEach(function(b){
      if (btns.indexOf(b) === -1) btns.push(b);
    });
    
    if (btns.length === 0) {
      console.log('[BQ R4] no hamburger button found');
      return;
    }
    
    // 2. 找 menu
    var menu = document.querySelector('.nav .nav-menu') 
            || document.querySelector('nav .nav-menu')
            || document.querySelector('.nav-menu')
            || document.querySelector('#navMenu');
    
    if (!menu) {
      console.log('[BQ R4] no nav-menu found');
      return;
    }
    
    // 3. 綁定所有按鈕(不重複)
    btns.forEach(function(btn){
      if (btn.__bqR4Bound) return;
      btn.__bqR4Bound = true;
      
      // 清掉舊的 onclick(避免衝突)
      btn.onclick = null;
      
      btn.addEventListener('click', function(e){
        e.preventDefault();
        e.stopPropagation();
        
        var isOpen = menu.classList.contains('open');
        if (isOpen) {
          menu.classList.remove('open');
          btns.forEach(function(b){
            b.classList.remove('open');
            b.setAttribute('aria-expanded', 'false');
          });
        } else {
          menu.classList.add('open');
          btns.forEach(function(b){
            b.classList.add('open');
            b.setAttribute('aria-expanded', 'true');
          });
        }
        console.log('[BQ R4] hamburger clicked, now open=' + !isOpen);
      }, true);  // useCapture=true 確保優先觸發
    });
    
    // 4. 點選單外關閉(避免綁在每個連結)
    document.addEventListener('click', function(e){
      if (!menu.classList.contains('open')) return;
      
      var clickedBtn = btns.some(function(b){ return b.contains(e.target); });
      var clickedMenu = menu.contains(e.target);
      
      if (!clickedBtn && !clickedMenu) {
        menu.classList.remove('open');
        btns.forEach(function(b){
          b.classList.remove('open');
          b.setAttribute('aria-expanded', 'false');
        });
      }
    });
    
    console.log('[BQ R4] hamburger bound: ' + btns.length + ' button(s)');
  }
  
  // 延遲執行,確保所有 DOM 都載入完
  if (document.readyState === 'loading') {
    document.addEventListener('DOMContentLoaded', initRealFix);
  } else {
    initRealFix();
  }
  
  // 再保險:window load 再跑一次
  window.addEventListener('load', initRealFix);
})();
</script>
